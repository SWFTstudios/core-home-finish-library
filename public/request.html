<!DOCTYPE html>
<html lang="en" data-lumina-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Request — Core Home</title>
    <link rel="stylesheet" href="/css/lumina-finish.css" />
    <link rel="stylesheet" href="/css/core-home-navbar.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="portal-body">
    <div id="core-home-navbar-mount" data-active="projects"></div>

    <main>
      <section class="hero">
        <h1>New render request</h1>
        <p>
          Select finishes visually, then submit a structured spec — no notes
          crammed into spreadsheet cells.
        </p>
      </section>

      <div id="form-banner" class="status-banner" hidden></div>

      <div class="request-layout">
        <section>
          <h2>Pick finishes</h2>
          <div id="picker-grid" class="finish-grid"></div>
        </section>

        <aside class="selection-panel">
          <h2>Your bowl</h2>
          <ul id="selection-list" class="selection-list"></ul>

          <form id="request-form" class="form-panel" style="margin-top: 1rem; padding: 0; border: none; background: transparent; box-shadow: none">
            <div class="form-field">
              <label for="title">Request title</label>
              <input id="title" name="title" required placeholder="e.g. 24oz water bottle — Spring 2026" />
            </div>
            <div class="form-field">
              <label for="product_type">Product type</label>
              <input id="product_type" name="product_type" placeholder="Water bottle, tumbler, etc." />
            </div>
            <div class="form-field">
              <label for="deadline">Target deadline</label>
              <input id="deadline" name="deadline" type="date" />
            </div>
            <div class="form-field">
              <label for="notes">Notes for ID</label>
              <textarea id="notes" name="notes" placeholder="Optional context — angles, references, constraints"></textarea>
            </div>
            <button class="btn" type="submit">Submit request</button>
          </form>
        </aside>
      </div>
    </main>

    <script type="module" src="/js/portal.js"></script>
    <script src="/js/app.js" type="module"></script>
  </body>
</html>
